        }

            width: 100%;

            margin: 6px 0;
            border: 1px solid #dddfe2;
            border-radius: 6px;
            font-size: 17px;
            outline: none;
        }
        .login-box input:focus {
            border-color: #1877f2;
            box-shadow: 0 0 0 2px #e7f3ff;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;

        .login-btn:hover { background: #166fe5; }
        .forgot { color: #1877f2; text-decoration: none; font-size: 14px; display: block; margin: 15px 0; }

            border-radius: 6px;
            font-size: 17px;
            font-weight: bold;

        .create-page a:hover { text-decoration: underline; }
        @media (max-width: 768px) {
